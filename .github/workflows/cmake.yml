name: cmake

on:
  workflow_call:

env:
  BUILD_DIR: build-cmake
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cache/cpm
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 750M
  SCCACHE_CACHE_SIZE: 750M

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux | gcc
            os: ubuntu-24.04
            pixi_env: linux-gcc
            cc: gcc
            cxx: g++
            compiler_cache: ccache
            cache_key: linux-gcc
            builds: |
              debug|Debug|
              relwithdebinfo|RelWithDebInfo|
              asan|RelWithDebInfo|-DEVENTIDE_SANITIZE_ADDRESS=ON
              ubsan|RelWithDebInfo|-DEVENTIDE_SANITIZE_UNDEFINED=ON

          - name: linux | clang
            os: ubuntu-24.04
            pixi_env: linux-clang
            cc: clang
            cxx: clang++
            compiler_cache: ccache
            cache_key: linux-clang
            builds: |
              debug|Debug|
              asan+ubsan|RelWithDebInfo|-DEVENTIDE_SANITIZE_ADDRESS=ON -DEVENTIDE_SANITIZE_UNDEFINED=ON
              tsan|RelWithDebInfo|-DEVENTIDE_SANITIZE_THREAD=ON
              no-exceptions|RelWithDebInfo|-DEVENTIDE_ENABLE_EXCEPTIONS=OFF

          - name: macos | apple-clang
            os: macos-15
            pixi_env: default
            cc: /usr/bin/clang
            cxx: /usr/bin/clang++
            compiler_cache: ccache
            cache_key: macos-appleclang
            builds: |
              debug|Debug|
              asan+ubsan|RelWithDebInfo|-DEVENTIDE_SANITIZE_ADDRESS=ON -DEVENTIDE_SANITIZE_UNDEFINED=ON

          - name: macos | pixi-clang
            os: macos-15
            pixi_env: macos-clang
            cc: clang
            cxx: clang++
            compiler_cache: ccache
            cache_key: macos-clang
            builds: |
              debug|Debug|
              relwithdebinfo|RelWithDebInfo|
              no-exceptions+no-rtti|RelWithDebInfo|-DEVENTIDE_ENABLE_EXCEPTIONS=OFF -DEVENTIDE_ENABLE_RTTI=OFF

          - name: windows | msvc
            os: windows-2025
            pixi_env: windows-msvc
            cc: cl
            cxx: cl
            compiler_cache: sccache
            needs_msvc_env: true
            cache_key: windows-msvc
            builds: |
              debug|Debug|
              asan|RelWithDebInfo|-DEVENTIDE_SANITIZE_ADDRESS=ON
              no-exceptions|RelWithDebInfo|-DEVENTIDE_ENABLE_EXCEPTIONS=OFF

          - name: windows | clang-cl
            os: windows-2025
            pixi_env: windows-llvm
            cc: clang-cl
            cxx: clang-cl
            compiler_cache: sccache
            needs_msvc_env: true
            cache_key: windows-clang-cl
            builds: |
              debug|Debug|
              relwithdebinfo|RelWithDebInfo|
              asan|RelWithDebInfo|-DEVENTIDE_SANITIZE_ADDRESS=ON

          - name: windows | mingw
            os: windows-2025
            pixi_env: windows-mingw
            cc: gcc
            cxx: g++
            compiler_cache: sccache
            cache_key: windows-mingw
            builds: |
              debug|Debug|
              relwithdebinfo|RelWithDebInfo|

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.61.0
          environments: ${{ matrix.pixi_env }}
          activate-environment: true
          cache: true

      - name: Setup MSVC environment
        if: ${{ matrix.needs_msvc_env }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore CPM cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-${{ hashFiles('pixi.lock', '.github/workflows/cmake.yml', 'CMakeLists.txt', 'src/**/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.compiler_cache == 'sccache' && env.SCCACHE_DIR || env.CCACHE_DIR }}
          key: ${{ matrix.compiler_cache }}-${{ runner.os }}-${{ matrix.cache_key }}-${{ hashFiles('pixi.lock', '.github/workflows/cmake.yml') }}
          restore-keys: |
            ${{ matrix.compiler_cache }}-${{ runner.os }}-${{ matrix.cache_key }}-
            ${{ matrix.compiler_cache }}-${{ runner.os }}-

      - name: Configure, build, and test
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.compiler_cache }}" == "ccache" ]]; then
            ccache --zero-stats || true
          else
            sccache --stop-server || true
            sccache --zero-stats || true
          fi
          status=0

          configure_build() {
            local build_dir="$1"
            local build_type="$2"
            local cmake_args="$3"

            if [[ "${{ runner.os }}" == "macOS" && "${{ matrix.cc }}" == "clang" ]]; then
              export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
              export CONDA_BUILD_SYSROOT="${SDKROOT}"
              cmake -S . -B "${build_dir}" -G Ninja \
                -DCMAKE_BUILD_TYPE="${build_type}" \
                -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
                -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
                -DCMAKE_OSX_SYSROOT="${SDKROOT}" \
                -DCMAKE_C_FLAGS="--sysroot=${SDKROOT}" \
                -DCMAKE_CXX_FLAGS="--sysroot=${SDKROOT}" \
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld --sysroot=${SDKROOT}" \
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld --sysroot=${SDKROOT}" \
                -DCMAKE_MODULE_LINKER_FLAGS="-fuse-ld=lld --sysroot=${SDKROOT}" \
                -DEVENTIDE_BUILD_ALL_TESTS=ON \
                -DEVENTIDE_USE_CPM_FOR_TESTS=ON \
                -DEVENTIDE_ENABLE_CCACHE=ON \
                ${cmake_args}
            else
              cmake -S . -B "${build_dir}" -G Ninja \
                -DCMAKE_BUILD_TYPE="${build_type}" \
                -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
                -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
                -DEVENTIDE_BUILD_ALL_TESTS=ON \
                -DEVENTIDE_USE_CPM_FOR_TESTS=ON \
                -DEVENTIDE_ENABLE_CCACHE=ON \
                ${cmake_args}
            fi
          }

          while IFS='|' read -r build_name build_type cmake_args; do
            [[ -n "${build_name}" ]] || continue

            build_dir="${BUILD_DIR}-${build_name}"
            echo "::group::${{ matrix.name }} | ${build_name}"

            if ! configure_build "${build_dir}" "${build_type}" "${cmake_args}"; then
              status=1
              echo "::endgroup::"
              continue
            fi

            if ! cmake --build "${build_dir}" --parallel; then
              status=1
              echo "::endgroup::"
              continue
            fi

            if ! ctest --test-dir "${build_dir}" --output-on-failure; then
              status=1
            fi

            echo "::endgroup::"
          done <<< "${{ matrix.builds }}"

          exit "${status}"

      - name: Show compiler cache stats
        shell: bash
        run: |
          if [[ "${{ matrix.compiler_cache }}" == "ccache" ]]; then
            ccache --show-stats --verbose || true
          else
            sccache --show-stats || true
            sccache --stop-server || true
          fi
